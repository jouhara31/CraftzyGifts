<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1120" role="img" aria-labelledby="title desc">
  <title id="title">Level-1 DFD for Seller Module</title>
  <desc id="desc">Seller-focused data flow diagram for CraftzyGifts showing product management, fulfillment, settlements, and payouts.</desc>
  <defs>
    <style>
      .bg { fill: #fffdfb; }
      .frame { fill: #fffdfb; stroke: #d7c9b8; stroke-width: 2; }
      .header { fill: #6f2b34; }
      .header-text { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #fffaf5; }
      .sub-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #6f6258; }
      .entity { fill: #f7efe4; stroke: #6f2b34; stroke-width: 2.1; }
      .process { fill: #ffffff; stroke: #243447; stroke-width: 2.6; }
      .store { fill: #f3f6fa; stroke: #607086; stroke-width: 2.1; }
      .entity-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #6f2b34; }
      .process-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #243447; }
      .store-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #243447; }
      .body { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #556273; }
      .connector { fill: none; stroke: #6f2b34; stroke-width: 3; marker-end: url(#arrow); }
      .note { fill: #fffaf3; stroke: #d3c4b1; stroke-width: 1.3; }
      .note-text { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6f2b34" />
    </marker>
  </defs>

  <rect class="bg" width="1700" height="1120" />
  <rect class="frame" x="24" y="24" width="1652" height="1072" rx="28" />
  <rect class="header" x="24" y="24" width="1652" height="86" rx="28" />
  <text class="header-text" x="850" y="77" text-anchor="middle">Figure 7.3 Level-1 DFD for Seller Module</text>
  <text class="sub-text" x="850" y="136" text-anchor="middle">Seller onboarding, catalog control, fulfillment workflow, settlements, and payouts</text>

  <rect class="entity" x="70" y="460" width="230" height="118" rx="22" />
  <text class="entity-title" x="185" y="508" text-anchor="middle">Seller</text>
  <text class="body" x="185" y="538" text-anchor="middle">Uses seller workspace</text>

  <rect class="process" x="360" y="150" width="500" height="126" rx="28" />
  <text class="process-title" x="610" y="200" text-anchor="middle">1.0 Seller Access and Store Profile</text>
  <text class="body" x="610" y="230" text-anchor="middle">Seller onboarding, approval state, settings, payout profile, store info</text>

  <rect class="process" x="360" y="340" width="500" height="126" rx="28" />
  <text class="process-title" x="610" y="390" text-anchor="middle">2.0 Product and Inventory Management</text>
  <text class="body" x="610" y="420" text-anchor="middle">Create products, variants, pricing, stock, media, and listed items</text>

  <rect class="process" x="360" y="530" width="500" height="126" rx="28" />
  <text class="process-title" x="610" y="580" text-anchor="middle">3.0 Order Fulfillment and Shipping Update</text>
  <text class="body" x="610" y="610" text-anchor="middle">Process seller orders, packaging, shipment, delivery, and review visibility</text>

  <rect class="process" x="360" y="720" width="500" height="126" rx="28" />
  <text class="process-title" x="610" y="770" text-anchor="middle">4.0 Settlement and Payout Tracking</text>
  <text class="body" x="610" y="800" text-anchor="middle">Compute payout readiness, request payout, track batch status and finance summary</text>

  <rect class="store" x="1040" y="110" width="470" height="94" rx="20" />
  <line x1="1068" y1="110" x2="1068" y2="204" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="147">D1 User</text>
  <text class="small" x="1092" y="172">Seller profile, bank details, approval state</text>

  <rect class="store" x="1040" y="250" width="470" height="94" rx="20" />
  <line x1="1068" y1="250" x2="1068" y2="344" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="287">D2 Product</text>
  <text class="small" x="1092" y="312">Catalog data, stock, variants, media, moderation</text>

  <rect class="store" x="1040" y="390" width="470" height="94" rx="20" />
  <line x1="1068" y1="390" x2="1068" y2="484" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="427">D4 CategoryMaster / CustomizationMaster</text>
  <text class="small" x="1092" y="452">Category structure and customization references</text>

  <rect class="store" x="1040" y="540" width="470" height="94" rx="20" />
  <line x1="1068" y1="540" x2="1068" y2="634" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="577">D3 Order</text>
  <text class="small" x="1092" y="602">Seller-assigned orders, payment, shipping, review state</text>

  <rect class="store" x="1040" y="690" width="470" height="94" rx="20" />
  <line x1="1068" y1="690" x2="1068" y2="784" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="727">D8 SellerSettlement</text>
  <text class="small" x="1092" y="752">Settlement snapshots, payoutable amount, notes, lifecycle</text>

  <rect class="store" x="1040" y="840" width="470" height="94" rx="20" />
  <line x1="1068" y1="840" x2="1068" y2="934" stroke="#607086" stroke-width="2.1" />
  <text class="store-title" x="1092" y="877">D9 SellerPayoutBatch</text>
  <text class="small" x="1092" y="902">Payout requests, totals, references, status transitions</text>

  <path class="connector" d="M300 519 L360 213" />
  <path class="connector" d="M300 519 L360 403" />
  <path class="connector" d="M300 519 L360 593" />
  <path class="connector" d="M300 519 L360 783" />

  <path class="connector" d="M860 213 L1040 157" />
  <path class="connector" d="M860 403 L1040 297" />
  <path class="connector" d="M860 423 L1040 437" />
  <path class="connector" d="M860 593 L1040 587" />
  <path class="connector" d="M860 783 L1040 737" />
  <path class="connector" d="M860 783 L1040 887" />
  <path class="connector" d="M860 783 L1040 587" />

  <rect class="note" x="176" y="198" width="152" height="44" rx="12" />
  <text class="note-text" x="252" y="225" text-anchor="middle">profile and access</text>

  <rect class="note" x="172" y="388" width="168" height="44" rx="12" />
  <text class="note-text" x="256" y="415" text-anchor="middle">product and stock data</text>

  <rect class="note" x="167" y="572" width="182" height="44" rx="12" />
  <text class="note-text" x="258" y="599" text-anchor="middle">fulfillment and shipping</text>

  <rect class="note" x="169" y="770" width="168" height="44" rx="12" />
  <text class="note-text" x="253" y="797" text-anchor="middle">payout request flow</text>

  <rect class="note" x="878" y="140" width="134" height="42" rx="12" />
  <text class="note-text" x="945" y="165" text-anchor="middle">seller record</text>

  <rect class="note" x="885" y="278" width="124" height="42" rx="12" />
  <text class="note-text" x="947" y="303" text-anchor="middle">catalog write</text>

  <rect class="note" x="890" y="565" width="118" height="42" rx="12" />
  <text class="note-text" x="949" y="590" text-anchor="middle">order update</text>

  <rect class="note" x="892" y="730" width="126" height="42" rx="12" />
  <text class="note-text" x="955" y="755" text-anchor="middle">settlement data</text>

  <rect class="note" x="890" y="868" width="132" height="42" rx="12" />
  <text class="note-text" x="956" y="893" text-anchor="middle">batch tracking</text>
</svg>
